<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | Elishana Daycare</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{
font-family:'Poppins',sans-serif;
}
</style>

</head>

<body class="bg-gradient-to-r from-pink-100 to-purple-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl w-full max-w-4xl grid md:grid-cols-2 overflow-hidden">

<!-- LEFT SIDE IMAGE -->

<div class="hidden md:block">

<img
src="https://images.unsplash.com/photo-1588072432836-e10032774350"
class="h-full w-full object-cover">

</div>


<!-- REGISTER FORM -->

<div class="p-10">

<h2 class="text-3xl font-bold text-gray-800 mb-2">
Create Account
</h2>

<p class="text-gray-500 mb-6">
Register your child at Elishana Daycare
</p>


<form class="space-y-4">

<!-- Parent Name -->

<div>

<label class="text-sm font-medium">Parent Full Name</label>

<div class="flex items-center border rounded-lg px-3 mt-1">

<i class="fa-solid fa-user text-gray-400"></i>

<input
type="text"
placeholder="Enter your name"
class="w-full p-2 outline-none">

</div>

</div>


<!-- Email -->

<div>

<label class="text-sm font-medium">Email Address</label>

<div class="flex items-center border rounded-lg px-3 mt-1">

<i class="fa-solid fa-envelope text-gray-400"></i>

<input
type="email"
placeholder="Enter email"
class="w-full p-2 outline-none">

</div>

</div>


<!-- Phone -->

<div>

<label class="text-sm font-medium">Phone Number</label>

<div class="flex items-center border rounded-lg px-3 mt-1">

<i class="fa-solid fa-phone text-gray-400"></i>

<input
type="tel"
placeholder="+255"
class="w-full p-2 outline-none">

</div>

</div>


<!-- Child Name -->

<div>

<label class="text-sm font-medium">Child Name</label>

<div class="flex items-center border rounded-lg px-3 mt-1">

<i class="fa-solid fa-child text-gray-400"></i>

<input
type="text"
placeholder="Child name"
class="w-full p-2 outline-none">

</div>

</div>


<!-- Child Age -->

<div>

<label class="text-sm font-medium">Child Age</label>

<div class="flex items-center border rounded-lg px-3 mt-1">

<i class="fa-solid fa-calendar text-gray-400"></i>

<input
type="number"
placeholder="Age"
class="w-full p-2 outline-none">

</div>

</div>


<!-- Password -->

<div>

<label class="text-sm font-medium">Password</label>

<div class="flex items-center border rounded-lg px-3 mt-1">

<i class="fa-solid fa-lock text-gray-400"></i>

<input
id="password"
type="password"
placeholder="Create password"
class="w-full p-2 outline-none">

<button
type="button"
onclick="togglePassword()"
class="text-gray-500">

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>


<!-- Submit -->

<button
class="w-full bg-pink-600 text-white py-3 rounded-lg font-semibold hover:bg-pink-700 transition">

Register Child

</button>


<!-- Login link -->

<p class="text-sm text-center mt-4">

Already registered?

<a href="#" class="text-pink-600 font-medium">
Login here
</a>

</p>

</form>

</div>

</div>


<script>

function togglePassword(){

const password=document.getElementById("password")

if(password.type==="password"){
password.type="text"
}else{
password.type="password"
}

}

</script>

</body>

</html>
